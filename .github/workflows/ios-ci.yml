name: iOS CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    name: Build and Unit Tests
    runs-on: macos-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Show available simulators
        run: xcrun simctl list devices available

      - name: Get simulator ID
        run: |
          DEVICE_ID=$(xcrun simctl list devices available | \
            grep "iPhone 16 (" | \
            head -1 | \
            sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')

          if [ -z "$DEVICE_ID" ]; then
            DEVICE_ID=$(xcrun simctl list devices available | \
              grep "iPhone" | \
              head -1 | \
              sed -E 's/.*\(([A-F0-9-]+)\).*/\1/')
          fi

          if [ -z "$DEVICE_ID" ]; then
            echo "No iPhone simulator found"
            exit 1
          fi

          echo "DEVICE_ID=$DEVICE_ID" >> $GITHUB_ENV
          echo "Using simulator id: $DEVICE_ID"

      - name: Build for testing
        run: |
          xcodebuild build-for-testing \
            -project FinAvsi.xcodeproj \
            -scheme FinAvsi \
            -destination "platform=iOS Simulator,id=$DEVICE_ID,arch=arm64" \
            -derivedDataPath DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.6

      - name: Run unit tests
        run: |
          xcodebuild test-without-building \
            -project FinAvsi.xcodeproj \
            -scheme FinAvsi \
            -destination "platform=iOS Simulator,id=$DEVICE_ID,arch=arm64" \
            -derivedDataPath DerivedData \
            -skip-testing:FinAvsiUITests \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            IPHONEOS_DEPLOYMENT_TARGET=17.6

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: TestResults.xcresult